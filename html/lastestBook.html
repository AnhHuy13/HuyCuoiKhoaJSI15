<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sách mới gần đây - Recently Added</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/lastestBook.css" />
    <link rel="stylesheet" href="../css/component/dialog.css" />
    <link rel="stylesheet" href="../css/component/loading.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="progress-container">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <main class="latest-books-page">
      <div class="latest-header">
        <div class="latest-header-left">
          <button class="go-back" id="back-btn">
            <span class="material-symbols-outlined arrow-left">arrow_left_alt</span>
          </button>
          <h2>Recently Added</h2>
        </div>

        <div class="layout-toggle-group">
          <button class="layout-btn" id="layout-compact-list-btn" title="Danh sách gọn">
            <span class="material-symbols-outlined">format_list_bulleted</span>
          </button>
          <button class="layout-btn active" id="layout-detailed-btn" title="Thẻ chi tiết">
            <span class="material-symbols-outlined">view_stream</span>
          </button>
          <button class="layout-btn" id="layout-grid-btn" title="Lưới rộng">
            <span class="material-symbols-outlined">grid_view</span>
          </button>
        </div>
      </div>

      <div class="results-meta" id="results-count-text" style="display: none"></div>

      <div class="latest-results-container list-view" id="results-container">
        <!-- Danh sách truyện mới tải động sẽ được render vào đây -->
      </div>

      <div class="pagination-container" id="pagination-wrapper" style="display: none">
        <button class="page-nav-btn" id="prev-page-btn" disabled>
          <span class="material-symbols-outlined">chevron_left</span> Trước
        </button>
        <span class="page-indicator" id="page-number-indicator">Trang 1</span>
        <button class="page-nav-btn" id="next-page-btn">
          Sau <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </main>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/lastestBook/lastestBook.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thư viện</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/favorite.css" />
    <link rel="stylesheet" href="../css/component/dialog.css" />
    <link rel="stylesheet" href="../css/component/loading.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_left_alt,bookmark,delete,star,visibility"
    />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="progress-container">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <main class="favorite-page">
      <div class="library-text">
        <button class="go-home">
          <span class="material-symbols-outlined arrow-left">arrow_left_alt</span>
        </button>
        <h2>Library</h2>
      </div>
      <div class="button-reading-status-container">
        <button class="status-button active" id="reading-status-button">Reading</button>
        <button class="status-button" id="plan-to-read-status-button">Plan to read</button>
        <button class="status-button" id="completed-status-button">Completed</button>
        <button class="status-button" id="on-hold-status-button">On-hold</button>
        <button class="status-button" id="dropped-status-button">Dropped</button>
      </div>
      <div class="favorite-main-page"></div>
    </main>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/favorite/favorite.js"></script>
  </body>
</html>

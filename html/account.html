<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tài khoản của bạn</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/account.css" />
    <link rel="stylesheet" href="../css/component/dialog.css" />
    <link rel="stylesheet" href="../css/component/loading.css" />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="progress-container">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <!-- Layout Navbar & Header -->
    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <main class="account-page">
      <!-- Banner chỉ chứa duy nhất avatar nhô sâu xuống -->
      <div class="banner-profile" id="banner-profile-bg">
        <div class="avatar-container">
          <img
            src="https://res.cloudinary.com/rimebiqz/image/upload/co_rgb:000000,l_text:Arial_20_bold_normal_left:DEFAULT%250AAVATAR%2520/fl_layer_apply,fl_no_overflow,g_center,x_-50,y_19/defaul-avatar-1_yl9xfo.jpg"
            class="avatar-image"
            id="user-avatar-img"
            alt="user avatar"
          />
        </div>

        <!-- Nút hình bút chì Edit góc phải banner (Sẽ ẩn nếu không phải chính chủ) -->
        <button id="btn-open-edit-dialog" class="btn-banner-edit d-none" title="Edit Profile">
          <span class="material-symbols-outlined">edit</span>
        </button>
      </div>

      <!-- Tên tài khoản và ID nằm hoàn toàn dưới nền tối bên cạnh avatar -->
      <div class="profile-header-details">
        <div class="name-container">
          <div class="name-flag-row">
            <span id="user-nationality-flag" class="fi d-none"></span>
            <h3 class="name-account" id="user-display-name">Your name</h3>
          </div>
          <p class="id-account" id="user-custom-id">@YourID</p>
        </div>
      </div>

      <!-- Thanh chuyển đổi Tabs (Lists, Info và Account) -->
      <div class="profile-tabs-nav">
        <button class="profile-tab-btn active" data-tab="lists">Lists</button>
        <button class="profile-tab-btn" data-tab="info">Info</button>
        <button class="profile-tab-btn d-none" data-tab="account">Account</button>
        <!-- Ẩn mặc định, hiện nếu chính chủ -->
      </div>

      <!-- Nội dung chi tiết của Tabs -->
      <div class="profile-tab-contents container-fluid mt-4 px-4">
        <!-- Tab Lists (1 Dòng chứa 1 List giãn rộng hết không gian) -->
        <div id="tab-pane-lists" class="tab-pane-box">
          <div class="user-lists-grid-vertical" id="profile-lists-container">
            <!-- Render danh sách truyện ở đây -->
          </div>
        </div>

        <!-- Tab Info (Bổ sung User ID và Profile Link) -->
        <div id="tab-pane-info" class="tab-pane-box d-none">
          <div class="profile-info-card-full">
            <div class="info-section mb-4">
              <h4>About me:</h4>
              <p id="profile-about-text" class="info-about-content">Chưa có giới thiệu bản thân.</p>
            </div>
            <div class="info-section mb-4">
              <h4>User ID:</h4>
              <p id="info-user-id" class="info-meta-content">Chưa xác định</p>
            </div>
            <div class="info-section">
              <h4>Profile Link:</h4>
              <div class="profile-share-link-wrapper">
                <input
                  type="text"
                  id="info-profile-link-input"
                  class="form-control-dark"
                  readonly
                  style="flex-grow: 1"
                />
                <button
                  id="btn-copy-profile-link"
                  class="btn-dialog-save"
                  style="padding: 10px 18px"
                >
                  Copy
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab Account (Quản lý đăng xuất rộng bằng box) -->
        <div id="tab-pane-account" class="tab-pane-box d-none">
          <div class="profile-info-card-full">
            <div class="info-section">
              <h4>Account Management</h4>
              <button id="btn-logout-account" class="btn-logout-full">Đăng xuất</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- NATIVE HTML DIALOG CHỈNH SỬA THÔNG TIN CÁ NHÂN -->
    <dialog id="edit-profile-dialog" class="profile-edit-dialog">
      <div class="dialog-header">
        <h3>Edit Profile</h3>
        <button id="btn-close-edit-dialog" class="dialog-close-x">&times;</button>
      </div>

      <div class="dialog-body">
        <!-- Thay đổi Avatar (Khung tròn) -->
        <div class="edit-field-group">
          <label class="edit-label">Avatar</label>
          <div class="avatar-upload-box" id="avatar-upload-trigger">
            <img id="dialog-avatar-preview" src="" alt="avatar" />
            <span class="plus-icon">+</span>
            <input type="file" id="input-avatar-file" accept="image/*" class="d-none" />
          </div>
        </div>

        <!-- Thay đổi Banner rộng tối đa -->
        <div class="edit-field-group">
          <label class="edit-label">Banner</label>
          <div class="banner-upload-box-full" id="banner-upload-trigger">
            <img id="dialog-banner-preview" src="" alt="banner" />
            <span class="plus-icon">+</span>
            <input type="file" id="input-banner-file" accept="image/*" class="d-none" />
          </div>
        </div>

        <!-- Thay đổi Display Name -->
        <div class="edit-field-group">
          <label class="edit-label">Display Name</label>
          <input
            type="text"
            id="edit-name-input"
            class="form-control-dark"
            placeholder="Nhập tên hiển thị"
          />
        </div>

        <!-- Tìm kiếm quốc tịch thông minh theo nguyên mẫu advancedSearch -->
        <div class="edit-field-group">
          <label class="edit-label">Nationality</label>
          <div class="custom-dropdown-nation" id="nation-custom-dropdown">
            <button type="button" class="custom-dropdown-btn-nation" id="nation-dropdown-btn">
              <span class="btn-content-nation">
                <span
                  class="selected-flag-nation-container"
                  id="nation-selected-flag-container"
                ></span>
                <span class="selected-text-nation" id="nation-selected-text">None</span>
              </span>
              <span class="material-symbols-outlined dropdown-arrow-nation">expand_more</span>
            </button>
            <div class="custom-dropdown-menu-nation" id="nation-dropdown-menu">
              <div class="dropdown-search-wrapper-nation">
                <span class="material-symbols-outlined search-icon-nation">search</span>
                <input
                  type="text"
                  id="nation-search-input"
                  placeholder="Search nationality..."
                  autocomplete="off"
                />
              </div>
              <div class="dropdown-items-list-nation" id="nation-dropdown-items-list">
                <!-- Danh sách quốc gia -->
              </div>
            </div>
          </div>
        </div>

        <!-- Mô tả bản thân About Me -->
        <div class="edit-field-group">
          <label class="edit-label">About Me</label>
          <textarea
            id="edit-about-input"
            class="form-control-dark"
            rows="4"
            placeholder="A few words about yourself..."
          ></textarea>
        </div>
      </div>

      <div class="dialog-footer">
        <button id="btn-save-profile" class="btn-dialog-save">Save</button>
      </div>
    </dialog>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/account/account.js"></script>
  </body>
</html>

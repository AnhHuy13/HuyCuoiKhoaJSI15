<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đọc truyện</title>
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/doctruyen.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css"
    />
  </head>
  <body>
    <div class="manga-container">
      <div class="manga-page-container" id="manga-page-container">
        <img src="" alt="" class="manga-page" id="manga-page" />
        <div class="slider-container">
          <div id="slider-tooltip">1</div>
          <input type="range" min="1" max="10" step="1" value="1" id="manga-progress" />
        </div>
      </div>

      <div class="manga-page-controller">
        <div class="manga-sidebar-start">
          <div class="manga-sidebar-name-container">
            <div class="manga-sidebar-name-container-content">
              <span class="fi fi-un" id="flag-icon-manga-original"></span>
              <h5 class="manga-sidebar-name-manga" id="manga-sidebar-name-manga">Tên truyện</h5>
            </div>
            <p class="manga-sidebar-chapter-name-manga" id="manga-sidebar-chapter-name-manga">
              Tên chương ở đây...
            </p>
          </div>
          <div class="manga-sidebar-scanlation-container">
            <p>Được dịch từ nhóm:</p>
            <div class="manga-sidebar-scanlation-info">
              <span class="fi fi-un" id="flag-icon-manga-scanlation"></span>
              <h6 class="manga-sidebar-scanlation-name" id="manga-sidebar-scanlation-name">
                Tên nhóm dịch...
              </h6>
            </div>
          </div>
          <div class="manga-sidebar-vol-switcher-container">
            <button
              id="manga-sidebar-previous-switch"
              class="manga-sidebar-previous-switch"
            ></button>
            <div class="manga-sidebar-vol-container">
              <p class="manga-sidebar-vol-current" class="manga-sidebar-vol-current">
                Vol. 1 Ch. 1 Chaptername....
              </p>
            </div>
            <button id="manga-sidebar-next-switch" class="manga-sidebar-next-switch"></button>
          </div>
        </div>

        <div class="manga-sidebar-end">
          <div class="manga-sidebar-button-container">
            <button id="prev-page"></button>
            <div class="manga-sidebar-page-container">
              <p class="manga-sidebar-page-current" class="manga-sidebar-page-current">
                Page 0/0000
              </p>
            </div>
            <button id="next-page"></button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/fetch.js"></script>
    <script type="module" src="../js/doctruyen/UIDocTruyen.js"></script>
    <script type="module" src="../js/doctruyen/sidebarDocTruyen.js"></script>
  </body>
</html>

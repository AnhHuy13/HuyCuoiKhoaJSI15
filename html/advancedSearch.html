<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tìm kiếm nâng cao</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/advancedSearch/advancedSearch.css" />
    <link rel="stylesheet" href="../css/component/dialog.css" />
    <link rel="stylesheet" href="../css/component/loading.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="progress-container">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <main class="advanced-search-page">
      <div class="search-header">
        <button class="go-back" id="back-btn">
          <span class="material-symbols-outlined arrow-left">arrow_left_alt</span>
        </button>
        <h2>Advanced Search</h2>
      </div>

      <div class="search-bar-wrapper">
        <div class="search-input-container">
          <span class="material-symbols-outlined search-icon-inside">search</span>
          <input type="text" id="main-search-input" placeholder="Search..." />
          <button id="clear-search-btn" class="clear-btn" style="display: none">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <button id="toggle-filters-btn" class="show-filters-btn">
          <span class="btn-text">Show filters</span>
          <span class="material-symbols-outlined icon-arrow">expand_more</span>
        </button>
      </div>

      <div id="filter-panel" class="filter-panel" style="display: none">
        <div class="filter-grid">
          <div class="filter-item">
            <label for="filter-sort">Sort by</label>
            <select id="filter-sort" class="filter-select">
              <option value="none">None</option>
              <option value="relevance">Best Match</option>
              <option value="rating">Rating</option>
              <option value="followedCount">Follows</option>
              <option value="latestUploadedChapter">Latest Update</option>
              <option value="createdAt">Newest</option>
            </select>
          </div>

          <div class="filter-item">
            <label>Filter tags</label>
            <div class="custom-dropdown" id="tags-custom-dropdown">
              <button type="button" class="custom-dropdown-btn" id="tags-dropdown-btn">
                <span class="btn-content">
                  <span
                    class="material-symbols-outlined tag-icon-mini"
                    style="font-size: 16px; color: #888"
                    >sell</span
                  >
                  <span id="selected-tags-summary-text">Filter tags</span>
                </span>
                <span class="material-symbols-outlined dropdown-arrow">expand_more</span>
              </button>

              <div class="custom-dropdown-menu tags-dropdown-menu" id="tags-dropdown-menu">
                <div class="dropdown-search-wrapper">
                  <span class="material-symbols-outlined search-icon">search</span>
                  <input
                    type="text"
                    id="tag-search-input"
                    placeholder="Search tags"
                    autocomplete="off"
                  />
                  <button type="button" id="tag-reset-btn" class="tag-reset-btn">Reset</button>
                </div>

                <div class="tag-help-bar" id="tag-help-bar">
                  <span class="info-icon">ⓘ</span>
                  <p class="help-text">
                    Click on any tag once to include it. Click on it again to exclude it. Click once
                    more to clear it.
                    <span class="dismiss-btn" id="dismiss-tag-help-btn">Dismiss</span>
                  </p>
                </div>

                <div class="tags-dropdown-scroll-list">
                  <div class="tag-categories-container">
                    <div class="tag-category-group" data-category="format">
                      <h3 class="category-title">Format</h3>
                      <div class="tag-grid" id="tags-grid-format"></div>
                    </div>

                    <div class="tag-category-group" data-category="genre">
                      <h3 class="category-title">Genre</h3>
                      <div class="tag-grid" id="tags-grid-genre"></div>
                    </div>

                    <div class="tag-category-group" data-category="theme">
                      <h3 class="category-title">Theme</h3>
                      <div class="tag-grid" id="tags-grid-theme"></div>
                    </div>

                    <div class="tag-category-group" data-category="content">
                      <h3 class="category-title">Content</h3>
                      <div class="tag-grid" id="tags-grid-content"></div>
                    </div>
                  </div>
                </div>

                <div class="tag-other-options-bar">
                  <h4 class="other-options-title">Other Options</h4>
                  <div class="other-options-grid">
                    <div class="option-item">
                      <label for="filter-tags-mode">Inclusion mode</label>
                      <select id="filter-tags-mode" class="filter-select">
                        <option value="OR">Or</option>
                        <option value="AND">And</option>
                      </select>
                    </div>
                    <div class="option-item">
                      <label for="filter-tags-exclusion-mode">Exclusion mode</label>
                      <select id="filter-tags-exclusion-mode" class="filter-select">
                        <option value="OR">Or</option>
                        <option value="AND">And</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="filter-item">
            <label for="filter-content-rating">Content Rating</label>
            <select id="filter-content-rating" class="filter-select">
              <option value="any">Any</option>
              <option value="safe">Safe</option>
              <option value="suggestive">Suggestive</option>
              <option value="erotica">Erótica</option>
            </select>
          </div>

          <div class="filter-item">
            <label for="filter-demographic">Magazine Demographic</label>
            <select id="filter-demographic" class="filter-select">
              <option value="any">Any</option>
              <option value="shounen">Shounen</option>
              <option value="shoujo">Shoujo</option>
              <option value="seinen">Seinen</option>
              <option value="josei">Josei</option>
            </select>
          </div>

          <div class="filter-item">
            <label for="filter-author">Authors</label>
            <input type="text" id="filter-author" class="filter-input" placeholder="Any" />
          </div>

          <div class="filter-item">
            <label for="filter-artist">Artists</label>
            <input type="text" id="filter-artist" class="filter-input" placeholder="Any" />
          </div>

          <div class="filter-item">
            <label>Original languages</label>
            <div class="custom-dropdown" id="orig-custom-dropdown">
              <button type="button" class="custom-dropdown-btn" id="orig-dropdown-btn">
                <span class="btn-content">
                  <span class="selected-flags-container" id="orig-selected-flags-container"></span>
                  <span class="selected-text" id="orig-selected-lang-text">All languages</span>
                </span>
                <span class="material-symbols-outlined dropdown-arrow">expand_more</span>
              </button>
              <div class="custom-dropdown-menu" id="orig-dropdown-menu">
                <div class="dropdown-search-wrapper">
                  <span class="material-symbols-outlined search-icon">search</span>
                  <input
                    type="text"
                    id="orig-search-input"
                    placeholder="Search language..."
                    autocomplete="off"
                  />
                </div>
                <div class="dropdown-items-list" id="orig-dropdown-items-list"></div>
              </div>
            </div>
          </div>

          <div class="filter-item">
            <label for="filter-year">Publication year</label>
            <div class="year-input-group">
              <button class="year-btn" id="year-minus">—</button>
              <input
                type="number"
                id="filter-year"
                class="filter-input year-input"
                placeholder="Any"
                min="1950"
                max="2026"
              />
              <button class="year-btn" id="year-plus">+</button>
            </div>
          </div>

          <div class="filter-item">
            <label for="filter-status">Publication Status</label>
            <select id="filter-status" class="filter-select">
              <option value="any">Any</option>
              <option value="ongoing">Ongoing</option>
              <option value="completed">Completed</option>
              <option value="hiatus">Hiatus</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>

          <div class="filter-item col-span-full-checkbox">
            <label class="checkbox-container">
              <input type="checkbox" id="filter-has-translated" />
              <span class="custom-checkbox"></span>
              Has translated chapters
            </label>
            <div id="translated-lang-wrapper" class="translated-lang-wrapper" style="display: none">
              <div class="custom-dropdown" id="lang-custom-dropdown">
                <button type="button" class="custom-dropdown-btn" id="lang-dropdown-btn">
                  <span class="btn-content">
                    <span class="selected-flags-container" id="selected-flags-container"></span>
                    <span class="selected-text" id="selected-lang-text">Any language</span>
                  </span>
                  <span class="material-symbols-outlined dropdown-arrow">expand_more</span>
                </button>
                <div class="custom-dropdown-menu" id="lang-dropdown-menu">
                  <div class="dropdown-search-wrapper">
                    <span class="material-symbols-outlined search-icon">search</span>
                    <input
                      type="text"
                      id="lang-search-input"
                      placeholder="Search language..."
                      autocomplete="off"
                    />
                  </div>
                  <div class="dropdown-items-list" id="lang-dropdown-items-list"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="search-actions-bar">
        <div class="action-buttons-left">
          <button id="reset-filters-btn" class="reset-btn">Reset filters</button>
          <button id="lucky-btn" class="lucky-btn">I'm feeling lucky</button>
          <button id="search-btn" class="search-submit-btn">
            <span class="material-symbols-outlined">search</span> Search
          </button>
        </div>

        <div class="layout-toggle-group">
          <button class="layout-btn active" id="layout-list-btn" title="Detailed List">
            <span class="material-symbols-outlined">view_list</span>
          </button>
          <button class="layout-btn" id="layout-grid-btn" title="Comfortable Grid">
            <span class="material-symbols-outlined">grid_view</span>
          </button>
          <button class="layout-btn" id="layout-compact-btn" title="Compact Cards">
            <span class="material-symbols-outlined">apps</span>
          </button>
        </div>
      </div>

      <div class="results-meta" id="results-count-text" style="display: none"></div>
      <div class="search-results-container list-view" id="results-container">
        <div class="empty-results-state">
          <span class="material-symbols-outlined massive-icon">search</span>
          <p>Nhập từ khóa và tùy chỉnh bộ lọc để tìm kiếm truyện</p>
        </div>
      </div>

      <div class="pagination-container" id="pagination-wrapper" style="display: none">
        <button class="page-nav-btn" id="prev-page-btn" disabled>
          <span class="material-symbols-outlined">chevron_left</span> Trước
        </button>
        <span class="page-indicator" id="page-number-indicator">Trang 1</span>
        <button class="page-nav-btn" id="next-page-btn">
          Sau <span class="material-symbols-outlined">chevron_right</span>
        </button>
      </div>
    </main>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/advancedSearch/advancedSearch.js"></script>
  </body>
</html>

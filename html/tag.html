<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thể loại truyện</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/tag.css" />
    <link rel="stylesheet" href="../css/component/dialog.css" />
    <link rel="stylesheet" href="../css/component/loading.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="progress-container">
          <div class="progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <main class="tag-page-container">
      <div class="tag-header">
        <button class="go-back" id="back-btn">
          <span class="material-symbols-outlined arrow-left">arrow_left_alt</span>
        </button>
        <h2 id="tag-title-header">Romance</h2>
      </div>

      <section class="trending-section">
        <h3 class="section-subtitle">Trending this year</h3>
        <div class="trending-grid" id="trending-manga-container">
          <!-- Các thẻ manga sẽ được render tự động bằng Javascript -->
        </div>
      </section>

      <div class="browse-all-wrapper">
        <a href="#" id="browse-all-link" class="browse-all-btn">Browse all Romance titles</a>
      </div>
    </main>

    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/tag/tag.js"></script>
  </body>
</html>

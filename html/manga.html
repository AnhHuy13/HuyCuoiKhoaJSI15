<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tên truyện</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
    />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/manga/manga.css" />

    <link rel="stylesheet" href="../css/font.css" />
    <link rel="stylesheet" href="../css/manga/manga-carousel.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="sidebar-open">
    <div id="loading-screen" class="loading-screen">
      <div class="loading-content">
        <p class="loading-text">Đang kết nối hệ thống...</p>
        <div class="custom-progress-container">
          <div class="custom-progress-bar" id="load-progress"></div>
        </div>
      </div>
    </div>

    <script type="module" src="../js/layout/headerNavbar.js"></script>

    <div id="carousel-home">
      <div id="carouselExampleCaptions" class="carousel slide">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img
              src="https://res.cloudinary.com/rimebiqz/image/upload/v1783914527/TEST_svywnr.jpg"
              class="manga-carousel-background d-block w-100"
              id="manga-carousel-background"
              alt="..."
            />
            <div class="carousel-caption">
              <div class="manga-carousel-content-container">
                <div class="manga-carousel-cover-container">
                  <img
                    src="https://res.cloudinary.com/rimebiqz/image/upload/v1783914527/TEST_svywnr.jpg"
                    alt=""
                    class="manga-carousel-cover"
                    id="manga-carousel-cover"
                  />
                </div>

                <div class="manga-carousel-text-info">
                  <div class="manga-carousel-title-manga-box">
                    <h3 class="manga-carousel-title-manga" id="manga-carousel-title-manga">
                      Lorem ipsum
                    </h3>
                  </div>

                  <div class="manga-carousel-title-english-box">
                    <h5 class="manga-carousel-title-english" id="manga-carousel-title-english">
                      Lorem ipsum dolor sit amet
                    </h5>
                  </div>
                  <ul class="manga-carousel-tag"></ul>
                  <div class="manga-carousel-author-box">
                    <p class="manga-carousel-author" id="manga-carousel-author">Lorem Ipsum</p>
                  </div>
                  <div class="manga-carousel-status-box">
                    <div class="manga-carousel-status-dot" id="manga-carousel-status-dot"></div>
                    <p class="manga-carousel-status" id="manga-carousel-status">Status:</p>
                  </div>

                  <div class="manga-carousel-btn">
                    <button class="manga-carousel-library-btn">Thêm vào Thư viện</button>
                    <button class="manga-carousel-favorite-btn">
                      <img
                        src="https://res.cloudinary.com/rimebiqz/image/upload/v1783914412/bookmark_khfizj.svg"
                        alt=""
                      />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <main class="content">
      <div class="manga-desc" id="manga-desc"></div>

      <div class="main-content-grid">
        <aside class="manga-sidebar"></aside>

        <section class="manga-main-info">
          <div class="chapter-controls d-flex justify-content-between align-items-center">
            <div class="d-flex gap-2">
              <button id="btn-toggle-sort" class="btn-sort">
                <i id="sort-icon" class="bi bi-sort-down"></i>
                <span id="sort-text">Descending</span>
              </button>
              <select id="filter-lang" class="btn-sort" style="outline: none">
                <option value="all">All Languages</option>
              </select>
            </div>

            <div class="pagination-controls d-flex align-items-center">
              <button id="prev-page" class="btn-page" disabled>
                <i class="bi bi-chevron-left"></i>
              </button>
              <span class="page-info" id="page-info">1 / 1</span>
              <button id="next-page" class="btn-page" disabled>
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>

          <div id="chapter-list-container"></div>
        </section>
      </div>
    </main>

    <script type="module" src="../js/fetch/fetchMangaPage.js"></script>
    <script type="module" src="../js/utility.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script type="module" src="../js/header.js"></script>
    <script type="module" src="../js/manga/manga.js"></script>
    <script type="module" src="../js/manga/manga-carousel.js"></script>
    <script type="module" src="../js/manga/manga-home.js"></script>
    <script type="module" src="../js/fetch/fetchSearch.js"></script>
    <script type="module" src="../js/doctruyen/locLangDocTruyen.js"></script>
  </body>
</html>

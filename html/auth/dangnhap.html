<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/auth.css" />
    <link rel="stylesheet" href="../../css/font.css" />
    <title>Đăng nhập</title>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <img
          src="https://res.cloudinary.com/rimebiqz/image/upload/v1783914526/logo_wp43wq.png"
          alt="logo"
        />
        <a href="#">Manga.org</a>
      </div>

      <div class="login-box">
        <div class="title"><h2>Đăng nhập vào tài khoản</h2></div>

        <div class="login-input-div">
          <label for="email">Email:</label>
          <input type="email" id="email" />
          <div id="email-login-message" class="message"></div>

          <label for="password">Mật khẩu:</label>
          <input type="password" id="password" />
          <div id="password-login-message" class="message"></div>

          <button class="login-btn">Đăng nhập</button>
        </div>

        <div class="or">hoặc</div>

        <button class="btn-google" onclick="dangNhapGoogle()">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width: 24px" />
          <span> Đăng nhập bằng Google </span>
        </button>

        <div class="box-new-user">
          <p>Người mới? <a href="./dangky.html">Đăng ký ở đây</a></p>
        </div>
      </div>
    </div>

    <div id="setup-profile-modal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-title">
          <h2>Hoàn thiện hồ sơ</h2>
          <p>Vui lòng chọn Tên hiển thị và ID cá nhân của bạn</p>
        </div>
        <div class="modal-body">
          <label for="modal-name">Tên hiển thị (Biệt danh):</label>
          <input type="text" id="modal-name" placeholder="Ví dụ: Otaku Đẹp Trai" />
          <div id="modal-name-error" class="message"></div>

          <label for="modal-custom-id">ID cá nhân (Chữ thường, viết liền, không dấu):</label>
          <input type="text" id="modal-custom-id" placeholder="Ví dụ: otaku123" />
          <div id="modal-custom-id-error" class="message"></div>

          <button id="modal-save-btn" class="login-btn">Xác nhận & Vào trang chủ</button>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

    <script type="module" src="../../js/firebase-config.js"></script>
    <script type="module" src="../../js/auth/login.js"></script>
  </body>
</html>

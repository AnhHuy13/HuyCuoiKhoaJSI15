<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/auth.css" />
    <link rel="stylesheet" href="../../css/font.css" />
    <title>Đăng ký</title>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <img src="../../image/logo.png" alt="logo" />
        <a href="#">Manga.org</a>
      </div>

      <div class="login-box">
        <div class="title"><h2>Tạo tài khoản mới</h2></div>

        <div class="login-input-div">
          <label for="email">Email:</label>
          <input type="email" id="email" />
          <div id="email-signup-message" class="message"></div>

          <label for="password">Mật khẩu:</label>
          <input type="password" id="password" />
          <div id="password-signup-message" class="message"></div>

          <label for="again-password">Nhập lại mật khẩu:</label>
          <input type="password" id="again-password" />
          <div id="again-password-signup-message" class="message"></div>

          <button class="login-btn" onclick="checkValidateforSignUp()">Đăng ký</button>
        </div>

        <div class="or">hoặc</div>

        <button class="btn-google" onclick="dangNhapGoogle()">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" style="width: 24px" />
          <span> Đăng ký bằng Google </span>
        </button>

        <div class="box-new-user">
          <p>Đã có tài khoản? <a href="./dangnhap.html">Đăng nhập ở đây</a></p>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

    <script src="../../js/firebase-config.js"></script>
    <script src="../../js/auth/register.js"></script>
  </body>
</html>
